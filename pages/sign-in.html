<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="">
		<link rel="icon" href="/home/alexander/Pictures/flameflame.ico" type="image/x-icon">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<link rel="stylesheet" href="..styles/sign-in-style.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
		<title>Sign in</title>
		
	</head>
	<body class="d-flex align-items-center py-4 bg-body-tertiary">
		<div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle">
			<button class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center" id="bd-theme" 
				type="button" aria-expanded="false" data-bs-toggle="dropdown" aria-label="Toggle theme (light)">
				<span class="feature-icon me-2">
                                	<i class="bi bi-sun-fill fs-5"></i>
                                </span>
				<span class="visually-hidden" id="bd-theme-text">Toggle theme</span>
			</button>
			<ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="bd-theme-text">
				<li>
					<button type="button" class="dropdown-item d-flex align-items-center active" 
						data-bs-theme-value="light" aria-pressed="true">
						<span class="bi me-2">
							<i class="bi bi-sun-fill"></i>
						</span>
						Light
						
					</button>
				</li>
				<li>
					<button type="button" class="dropdown-item d-flex align-items-center" 
						data-bs-theme-value="dark" aria-pressed="false">
						<span class="me-2">
                                                	<i class="bi bi-moon-stars-fill"></i>
                                                </span>
						Dark
					</button>
				</li>
				<li>
					<button type="button" class="dropdown-item d-flex align-items-center" 
						data-bs-theme-value="auto" aria-pressed="false">
						<span class="me-2">
							<i class="bi bi-circle-half"></i>
                                                </span>	
						Auto
					</button>
				</li>
			</ul>
		</div>
		<main class="form-signin w-100 m-auto">
			<form>
				<img class="mb-4" src="/home/alexander/my-website-project/assets/icons/flameflame.png" alt="" width="72" height="57">
				<h1 class="h3 mb-3 fw-normal">Please sign in</h1>
				<div class="form-floating">
					<input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
					<label for="floatingInput">Email address</label>
				</div>
				<div class="form-floating">
					<input type="password" class="form-control" id="floatingPassword" placeholder="Password">
					<label for="floatingPassword">Password</label>
				</div>
				<div class="form-check text-start my-3">
					<input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
					<label class="form-check-label" for="checkDefault">Remember me</label>
				</div>
				<div class="d-grid d-sm-flex justify-content-between mb-3">
					<div>
						<a class="text-decoration-none" href="404.html">Forgot Password?</a>
					</div>
					<div>
						<a class="text-decoration-none" href="#">Sign up</a>
					</div>
				</div>
				<button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
				<p class="mt-5 mb-3 text-body-secondary">© 2025-2026</p>
			</form>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
		</script>
		<script src="../scripts/sign-in.js"></script>
	</body>
</html>
